{% extends "layout.html" %}
{% block body %}
<style>
  .content {
    width: 80%;
    margin: 0 auto;
}

.wrapped-image {
    float: left; /* This will make the image float to the left of the text */
    margin: 0 15px 15px 0; /* Adds some space around the image */
    max-width: 200px; /* Adjust the size of the image */
}
</style>

<main id="main">

  <section style="padding-top: 8vh;">
    <div style="display: flex; align-items: center; margin-bottom: 1vh; justify-content: center;">
        <h3 style="padding-top: 3px;" id="title"><b>Academic Announcements</b></h3>
    </div>
</section>

  <section style="padding: 20px 0;">
    <div class="container">
      <div class="row" style="display: flex; flex-wrap: wrap;">
        
        {% for article in academic_news %}

            <div class="col-md-4"  style="margin-bottom: 20px;">
                <a href="/expand/{{article.id}}" style="text-decoration: none;">
                    <div class="card"  style="flex-grow: 1; overflow: hidden;">
                        <img class="card-img-top" src="{{article.image}}" max-width="100%" height="300px" style="object-fit: contain;" alt="Card image cap" >                
                    <div class="card-body">
                        <p class="card-text" style="font-size: 20px Butler; color: #111111;"><b>{{article.title}}</b></p>
                    </div>
                    
                    </div>
                </a>
            </div>
        {% endfor %}
        </div>
    </div>
  </section>
 

</main><!-- End #main -->
